<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="orb-canvas"></canvas>

    <div id="hud-shell" aria-label="JARVIS mission control">
      <section id="hud-left" class="hud-panel">
        <div class="hud-kicker">MISSION CONTROL</div>
        <div class="hud-title">Live Systems</div>
        <div class="hud-metrics">
          <div><span>LINK</span><strong id="metric-link">connecting</strong></div>
          <div><span>UPTIME</span><strong id="metric-uptime">--</strong></div>
          <div><span>LOAD</span><strong id="metric-load">--</strong></div>
          <div><span>DISK</span><strong id="metric-disk">--</strong></div>
        </div>
        <div id="drop-zone">
          <span>DROP FILES</span>
          <small>Text, code, JSON, Markdown and CSV become instant context.</small>
        </div>
      </section>

      <section id="hud-right" class="hud-panel">
        <div class="hud-kicker">COMMAND DECK</div>
        <div class="hud-title">Rapid Actions</div>
        <div id="quick-actions">
          <button data-command="Look at my screen and summarize what matters.">Scan Screen</button>
          <button data-command="Summarize today's calendar and unread email priorities.">Daily Brief</button>
          <button data-command="Show my open tasks and suggest what to do next.">Task Focus</button>
          <button data-command="Review the current JARVIS project and suggest one improvement.">Self Review</button>
        </div>
        <div id="event-log" aria-live="polite"></div>
      </section>
    </div>

    <!-- Minimal controls — top right -->
    <div id="controls">
      <button id="btn-mute" title="Mute/Unmute">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <button id="btn-menu" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Dropdown menu -->
    <div id="menu-dropdown" style="display:none">
      <button id="btn-settings">Settings</button>
      <button id="btn-restart">Restart Server</button>
      <button id="btn-fix-self">Fix Yourself</button>
    </div>

    <div id="status-text"></div>
    <div id="jarvis-label">JARVIS</div>
    <div id="error-text"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
